[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm ci --omit=dev"

[build.nixpacksConfig]
providers = ["node"]
nodeVersion = "20"

[deploy]
startCommand = "cd backend && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
