services:
  - type: web
    name: moon-backend
    runtime: node
    rootDir: .
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_NAME
        value: MOON Backend
      - key: API_PREFIX
        value: /api
      
      # Frontend Connectivity
      - key: FRONTEND_URL
        sync: false
      - key: STOREFRONT_URL
        sync: false
      - key: REVALIDATE_SECRET
        sync: false
        
      # Authentication
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
        
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        
      # Razorpay
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
        
      # Email (SendGrid/Resend)
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: orders@moonbrand.com
        
      # Twilio
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
