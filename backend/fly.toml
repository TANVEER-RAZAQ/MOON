app = "moon-backend"
primary_region = "iad" # Replace with your preferred region

[build]
  # Using the standard Heroku/Paketo Node.js builder
  # or you can simply use a Dockerfile if you have one.
  # Fly's remote builder automatically detects standard Node.js apps.
  builder = "paketobuildpacks/builder:base"
  # buildpacks = ["paketo-buildpacks/nodejs"] # Optionally specify if needed

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"
